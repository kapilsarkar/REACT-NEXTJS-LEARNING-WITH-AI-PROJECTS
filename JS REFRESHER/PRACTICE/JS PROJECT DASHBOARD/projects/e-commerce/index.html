<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />

    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>Mini Store | Shopping Cart</title>

    <link rel="stylesheet" href="styles.css" />
  </head>

  <body>
    <header class="header">
      <h1>Mini Store</h1>
    </header>

    <main class="container">
      <div class="store-layout">
        <!-- Products -->

        <section class="products-section">
          <h2>Products</h2>

          <div id="product-list">
            <!-- Products will be rendered by JavaScript -->
          </div>
        </section>

        <!-- Cart -->

        <section class="cart-section">
          <h2>Shopping Cart</h2>

          <div id="cart-items">
            <p id="empty-cart">Your cart is empty.</p>
          </div>

          <div id="cart-total" class="hidden">
            <p>Total: <span id="total-price">$0.00</span></p>

            <button id="checkout-btn" aria-label="Checkout items">
              Checkout
            </button>
          </div>
        </section>
      </div>
    </main>

    <footer>
      <p>Mini Store © 2026</p>
    </footer>

    <script src="script.js"></script>
  </body>
</html>
